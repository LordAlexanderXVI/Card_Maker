<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Item Card Creator - Multi-Card Forge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Uncial+Antiqua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="flex flex-col md:flex-row h-screen">

    <aside class="w-full md:w-1/3 bg-gray-800 p-6 overflow-y-auto border-r border-gray-700 shadow-xl z-20 flex flex-col gap-4">
        <div>
            <h1 class="text-2xl font-bold text-amber-500 font-serif mb-1">Arcane Forge</h1>
            <p class="text-sm text-gray-400 mb-3">D&D Item Card Forge</p>
            
            <div class="flex gap-2 border-b border-gray-700 pb-3" id="tabContainer">
                <button id="tab-0" class="tab-btn flex-1 py-1.5 px-2 text-sm font-bold rounded bg-amber-600 text-white transition-colors" onclick="switchTab(0)">Item 1</button>
                <button id="tab-1" class="tab-btn flex-1 py-1.5 px-2 text-sm font-bold rounded bg-gray-700 text-gray-400 hover:bg-gray-600 transition-colors" onclick="switchTab(1)">Item 2</button>
                <button id="tab-2" class="tab-btn flex-1 py-1.5 px-2 text-sm font-bold rounded bg-gray-700 text-gray-400 hover:bg-gray-600 transition-colors" onclick="switchTab(2)">Item 3</button>
                <button id="tab-3" class="tab-btn flex-1 py-1.5 px-2 text-sm font-bold rounded bg-gray-700 text-gray-400 hover:bg-gray-600 transition-colors" onclick="switchTab(3)">Item 4</button>
            </div>
        </div>

        <div class="space-y-4 flex-grow">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Item Name</label>
                <input type="text" id="inputName" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Type</label>
                    <input type="text" id="inputType" placeholder="e.g. Wondrous Item" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Rarity</label>
                    <select id="inputRarity" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500">
                        <option value="">None</option>
                        <option value="Common">Common</option>
                        <option value="Uncommon">Uncommon</option>
                        <option value="Rare">Rare</option>
                        <option value="Very Rare">Very Rare</option>
                        <option value="Legendary">Legendary</option>
                        <option value="Artifact">Artifact</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Weight</label>
                    <input type="text" id="inputWeight" placeholder="e.g. 2 lbs" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500">
                </div>
                <div class="flex items-center mt-6">
                    <input type="checkbox" id="inputAttunement" class="w-4 h-4 text-amber-500 bg-gray-900 border-gray-600 rounded focus:ring-amber-500 focus:ring-2">
                    <label class="ml-2 text-xs font-medium text-gray-400">Requires Attunement</label>
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1 flex justify-between">
                    <span>Appearance & Description</span>
                    <span class="text-[10px] text-gray-500 font-normal">Gap Below: <span id="gapVal">12</span>px</span>
                </label>
                <textarea id="inputDesc" rows="4" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500 resize-none"></textarea>
                <input type="range" id="inputDescSpacing" min="0" max="60" value="12" class="w-full h-1 mt-1 bg-gray-700 rounded-lg appearance-none cursor-pointer">
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Mechanics & Rules</label>
                <textarea id="inputRules" rows="5" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500 resize-none"></textarea>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Manual Font Size (Leave empty for Auto-Shrink)</label>
                <input type="number" id="inputFontSize" placeholder="Auto" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500 placeholder-gray-600">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Footer Front</label>
                    <input type="text" id="inputFooterFront" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Footer Back</label>
                    <input type="text" id="inputFooterBack" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <div class="pt-2 border-t border-gray-700">
                <label class="block text-xs font-medium text-amber-500 mb-1">Upload Card Art (.png or .jpg)</label>
                <input type="file" id="imageUpload" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-gray-700 file:text-white hover:file:bg-gray-600">
            </div>
            
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1 flex justify-between">
                    <span>Art Brightness / Dither Threshold</span>
                    <span id="brightnessVal" class="text-amber-500">0</span>
                </label>
                <input type="range" id="brightnessSlider" min="-100" max="100" value="0" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
            </div>
        </div>
        
        <div class="pt-4 border-t border-gray-700 flex flex-col gap-2">
            <button onclick="window.print()" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-2 px-4 rounded transition-colors shadow-lg">
                Print / Save PDF (All 4 Cards)
            </button>
            <button onclick="exportEmbeddedImage()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded transition-colors shadow-lg text-sm">
                Save & Export "Magic PNG"
            </button>
            <p class="text-[10px] text-gray-500 text-center leading-tight">Magic PNGs contain hidden item stats. Upload one above to instantly restore the card.</p>
        </div>
    </aside>

    <main class="w-full md:w-2/3 bg-gray-900 flex items-center justify-center p-8 relative overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20 pointer-events-none"></div>
        
        <div class="scene" id="cardScene">
            <div class="card" id="theCard">
                <div class="card-face card-face-front parchment p-6 flex flex-col">
                    <div class="add-border"></div>
                    <div class="relative z-10 flex flex-col h-full">
                        <h2 data-target="name" class="card-title text-2xl text-center uppercase tracking-wider mb-3 border-b border-[var(--ink-color)] pb-2"></h2>
                        <div class="flex-grow overflow-hidden flex flex-col">
                            <p data-target="desc" class="italic text-left leading-relaxed break-words"></p>
                            <p data-target="rules" class="text-left leading-relaxed font-medium break-words"></p>
                        </div>
                        <div data-target="footerFront" class="mt-auto pt-2 text-center text-xs card-body opacity-70">
                            ~ D&D Item ~
                        </div>
                    </div>
                </div>

                <div class="card-face card-face-back parchment p-5">
                    <div class="add-border"></div>
                    <div class="relative z-10 flex flex-col h-full w-full items-center p-2">
                        <h2 data-target="nameBack" class="card-title text-xl text-center uppercase tracking-wider mb-2 border-b border-[var(--ink-color)] pb-1 w-full"></h2>
                        <div class="w-full flex justify-between text-[11px] italic font-bold mb-1 px-1">
                            <span data-target="typeRarity" class="opacity-80"></span>
                            <span data-target="weightBack" class="opacity-80"></span>
                        </div>
                        <div data-target="attunementBack" class="w-full text-center text-[11px] italic font-bold mb-2 hidden">
                            (Requires Attunement)
                        </div>
                        <div class="flex-grow w-full flex items-center justify-center overflow-hidden border border-[rgba(0,0,0,0.1)] rounded bg-white/20 p-1">
                            <canvas id="artCanvas" class="max-w-full max-h-full object-contain" style="image-rendering: pixelated;"></canvas>
                        </div>
                        <p data-target="footerBack" class="card-body text-xs mt-3 opacity-50">Illustration</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="print-layout"></div>

    <script src="script.js"></script>
</body>
</html>
