<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Item Card Creator - Multi-Card Forge</title>
    <script src="themes.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Uncial+Antiqua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="flex flex-col md:flex-row h-screen">

    <aside class="w-full md:w-1/3 bg-gray-800 p-6 overflow-y-auto border-r border-gray-700 shadow-xl z-20 flex flex-col gap-4">
        <div>
            <h1 class="text-2xl font-bold text-amber-500 font-serif mb-1">Arcane Forge</h1>
            <p class="text-sm text-gray-400 mb-3">D&D Item Card Forge</p>
            
            <div class="flex gap-2 border-b border-gray-700 pb-3" id="tabContainer">
                <button id="tab-0" class="tab-btn flex-1 py-1.5 px-2 text-sm font-bold rounded bg-amber-600 text-white transition-colors" onclick="switchTab(0)">Item 1</button>
                <button id="tab-1" class="tab-btn flex-1 py-1.5 px-2 text-sm font-bold rounded bg-gray-700 text-gray-400 hover:bg-gray-600 transition-colors" onclick="switchTab(1)">Item 2</button>
                <button id="tab-2" class="tab-btn flex-1 py-1.5 px-2 text-sm font-bold rounded bg-gray-700 text-gray-400 hover:bg-gray-600 transition-colors" onclick="switchTab(2)">Item 3</button>
                <button id="tab-3" class="tab-btn flex-1 py-1.5 px-2 text-sm font-bold rounded bg-gray-700 text-gray-400 hover:bg-gray-600 transition-colors" onclick="switchTab(3)">Item 4</button>
            </div>
        </div>

        <div class="space-y-4 flex-grow">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Item Name</label>
                <input type="text" id="inputName" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500 transition-colors">
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="block text-xs font-medium text-gray-400 mb-1">Type / Category</label>
                    <input type="text" id="inputType" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500">
                </div>
                <div class="w-1/2">
                    <label class="block text-xs font-medium text-gray-400 mb-1">Weight</label>
                    <input type="text" id="inputWeight" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <div class="flex items-center gap-2">
                <input type="checkbox" id="inputAttunement" class="w-4 h-4 text-amber-500 bg-gray-900 border-gray-600 rounded focus:ring-amber-500 focus:ring-offset-gray-800 cursor-pointer">
                <label class="text-xs font-medium text-gray-400 cursor-pointer" for="inputAttunement">Requires Attunement</label>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Appearance & Description</label>
                <textarea id="inputDesc" rows="4" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500 resize-none"></textarea>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Mechanics & Rules</label>
                <textarea id="inputRules" rows="5" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500 resize-none"></textarea>
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="block text-xs font-medium text-gray-400 mb-1">Front Footer</label>
                    <input type="text" id="inputFooterFront" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500">
                </div>
                <div class="w-1/2">
                    <label class="block text-xs font-medium text-gray-400 mb-1">Back Footer</label>
                    <input type="text" id="inputFooterBack" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <hr class="border-gray-700 my-2">

            <div>
                <label class="block text-xs font-medium text-amber-500 mb-1">Item Illustration (Current Item)</label>
                <input type="file" id="imageUpload" accept="image/*" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-gray-700 file:text-amber-500 hover:file:bg-gray-600 cursor-pointer">
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1 flex justify-between">
                    <span>Ink Threshold (Brightness)</span>
                    <span id="brightnessVal">0</span>
                </label>
                <input type="range" id="brightnessSlider" min="-100" max="100" value="0" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                <p class="text-[10px] text-gray-500 mt-1">Adjust to get the perfect retro dithered look.</p>
            </div>
        </div>

        <div>
            <label class="block text-xs font-medium text-gray-400 mb-1">Card Theme</label>
            <select id="inputTheme" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white">
                <option value="classic">Classic AD&D</option>
                <option value="minimalist">Modern Minimalist</option>
            </select>
        </div>
        
        <div class="scene" id="cardScene">
            <div class="card shadow-2xl" id="theCard">
                </div>
        </div>

        <button onclick="window.print()" class="w-full bg-amber-700 hover:bg-amber-600 text-white font-bold py-3 px-4 rounded mt-4 transition-colors flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
            Print / Export All 4 Cards
        </button>
        <p class="text-center text-[10px] text-gray-500 mt-1 leading-tight px-2">
            Set printer to <b>"Print on both sides (Flip on long edge)"</b>. <br/>All 4 tabs will print perfectly aligned on a single sheet.
        </p>
    </aside>

    <main class="w-full md:w-2/3 bg-neutral-900 flex flex-col items-center justify-center p-8 relative overflow-hidden">
        <p class="absolute top-8 text-gray-500 text-sm animate-pulse tracking-widest uppercase">Click card to flip</p>

        <div class="scene" id="cardScene">
            <div class="card shadow-2xl" id="theCard">
                </div>
        </div>
    </main>

    <div id="print-layout"></div>

    <script src="script.js"></script>
</body>
</html>
